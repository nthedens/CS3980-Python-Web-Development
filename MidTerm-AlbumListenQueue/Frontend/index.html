<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Queue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Album Queue</h1>
        
        <!-- Auth Section -->
        <div id="auth-section">
            <div id="login-form-container">
                <h2>Login</h2>
                <form id="login-form" class="auth-form">
                    <input type="text" id="login-username" placeholder="Username" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit" id="login-submit-btn">Login</button>
                </form>
                <div class="auth-toggle">
                    Don't have an account? <a onclick="showRegister()">Register</a>
                </div>
            </div>

            <div id="register-form-container" style="display: none;">
                <h2>Register</h2>
                <form id="register-form" class="auth-form">
                    <input type="text" id="reg-username" placeholder="Username" required>
                    <input type="email" id="reg-email" placeholder="Email" required>
                    <input type="password" id="reg-password" placeholder="Password" required>
                    <button type="submit" id="register-submit-btn">Register</button>
                </form>
                <div class="auth-toggle">
                    Already have an account? <a onclick="showLogin()">Login</a>
                </div>
            </div>
        </div>

        <div id="main-content" style="display: none;">
            <div id="user-info">
                <span>Logged in as: <strong id="current-username"></strong></span>
                <button onclick="logout()" id="logout-btn">Logout</button>
            </div>

            <!-- Updated Form Structure -->
            <form id="add-album-form">
                <h2 id="form-title">Add to Queue</h2>
                <div class="form-grid">
                    <!--Text Input for Album details-->
                    <input type="text" id="title" placeholder="Album Title" required class="full-width">
                    <input type="text" id="artist" placeholder="Artist" required>
                    <input type="number" id="year" placeholder="Year">
                    <!--Drop down menu for listening form-->
                    <select id="listen_format" required>
                        <option value="" disabled selected>Music Format</option>
                        <option value="Digital">Digital</option>
                        <option value="Vinyl">Vinyl</option>
                        <option value="CD">CD</option>
                        <option value="Cassette">Cassette</option>
                    </select>
                    <!-- check box for priority-->
                    <div class="priority-input">
                        <input type="checkbox" id="priority">
                        <label for="priority">Priority Album</label>
                    </div>
                    
                    <!-- Button Container -->
                    <div class="form-buttons full-width">
                        <button type="submit" id="submit-btn">Add Album</button>
                        
                        <!--edit cancel button (starts hidden show when declare edit mode)-->
                        <button type="button" id="cancel-edit-btn" class="full-width" style="display: none;" onclick="cancelEdit()">Cancel Edit</button>
                    </div>
                </div>
            </form>
            <!--Albums lists-->
            <div class="list-section">
                <h2>Listening Queue</h2>
                <div id="album-list"></div>
            </div>

            <div class="list-section">
                <h2>Listened Albums</h2>
                <div id="listened-album-list"></div>
            </div>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
